global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs: [ { targets: [ "otel-collector:9464" ] } ]

  - job_name: sequoia-services
    metrics_path: /metrics
    static_configs:
      - targets:
        - "api-gateway:8080"
        - "auth-service:8081"
        - "device-service:8082"
        - "realtime-gateway:8083"
        - "ai-orchestrator:8084"
        - "workflow-engine:8085"
        - "plugin-host:8086"
        - "command-executor:8087"
        - "notification-service:8088"
        - "telemetry-service:8089"
