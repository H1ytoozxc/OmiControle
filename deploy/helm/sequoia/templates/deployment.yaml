{{/* Generic deployment template, parameterized per service. Instantiated by
     templates that loop over .Values.services. Kept compact; production
     charts split this into one file per service for clarity. */}}
{{- range $svc, $cfg := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ kebabcase $svc }}
  namespace: {{ default "sequoia" $.Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ kebabcase $svc }}
    app.kubernetes.io/part-of: sequoia
spec:
  replicas: {{ default 1 $cfg.replicas }}
  selector:
    matchLabels: { app.kubernetes.io/name: {{ kebabcase $svc }} }
  template:
    metadata:
      labels: { app.kubernetes.io/name: {{ kebabcase $svc }} }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        linkerd.io/inject: enabled
    spec:
      automountServiceAccountToken: false
      securityContext: { runAsNonRoot: true, runAsUser: 65532, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: app
          image: "{{ $.Values.global.image.registry }}/{{ kebabcase $svc }}:{{ default $.Values.global.image.tag $cfg.tag }}"
          imagePullPolicy: {{ $.Values.global.image.pullPolicy }}
          env:
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "{{ $.Values.global.observability.otlpEndpoint }}" }
          envFrom:
            - secretRef: { name: "{{ kebabcase $svc }}-secrets" }
          resources: {{- toYaml (default dict $cfg.resources) | nindent 12 }}
          readinessProbe: { httpGet: { path: /healthz/ready, port: 8080 } }
          livenessProbe:  { httpGet: { path: /healthz/live,  port: 8080 } }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
{{- end }}
