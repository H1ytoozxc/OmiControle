syntax = "proto3";
package sequoia.v1;

import "sequoia/v1/common.proto";
import "google/protobuf/timestamp.proto";

service DeviceService {
  // Operator-facing CRUD.
  rpc CreateEnrollment (CreateEnrollmentRequest) returns (Enrollment);
  rpc ListDevices      (ListDevicesRequest)      returns (ListDevicesResponse);
  rpc GetDevice        (GetDeviceRequest)        returns (Device);
  rpc DeleteDevice     (DeleteDeviceRequest)     returns (Empty);

  // Agent-facing enrollment exchange (Noise XX is conducted over the bytes
  // of nonces; this RPC ties identity + CSR to a tenant after handshake).
  rpc Enroll (EnrollRequest) returns (EnrollResponse);

  // Bidirectional control plane. Server pushes Commands; agent pushes
  // ClientMessages. The stream is the multiplexer for ALL realtime
  // device traffic (telemetry, commands, file chunks, plugin events).
  rpc Channel (stream ClientMessage) returns (stream ServerMessage);
}

message Device {
  string id          = 1;
  string tenant_id   = 2;
  string name        = 3;
  string platform    = 4;  // "windows" | "linux" | "macos" | "android"
  string agent_version = 5;
  string status      = 6;  // online | offline | unreachable
  bytes  public_key  = 7;  // Ed25519
  google.protobuf.Timestamp enrolled_at  = 8;
  google.protobuf.Timestamp last_seen_at = 9;
  map<string, string> labels = 10;
}

message CreateEnrollmentRequest {
  RequestContext context = 1;
  uint32         ttl_s   = 2;
  map<string, string> labels = 3;
}

message Enrollment {
  string code        = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message ListDevicesRequest {
  RequestContext context = 1;
  PageRequest    page    = 2;
  string         status  = 3;
}

message ListDevicesResponse {
  repeated Device items = 1;
  string next_cursor    = 2;
}

message GetDeviceRequest {
  RequestContext context = 1;
  string device_id       = 2;
}

message DeleteDeviceRequest {
  RequestContext context = 1;
  string device_id       = 2;
}

message EnrollRequest {
  string code            = 1;
  bytes  public_key      = 2;  // Ed25519
  string platform        = 3;
  string agent_version   = 4;
  string hostname        = 5;
  bytes  attestation     = 6;  // optional TPM/SEP/StrongBox attestation
}

message EnrollResponse {
  string device_id            = 1;
  string tenant_id            = 2;
  bytes  device_certificate   = 3;  // X.509-style DER
  string device_jwt           = 4;
  uint32 device_jwt_ttl_s     = 5;
  bytes  trust_anchor_cert    = 6;  // tenant CA root
}

// --- Bi-di channel messages ---

message ClientMessage {
  uint64 seq = 1;
  uint64 ack = 2;
  oneof body {
    Heartbeat       heartbeat        = 10;
    Telemetry       telemetry        = 11;
    CommandResult   command_result   = 12;
    FileChunk       file_chunk       = 13;
    LogBatch        logs             = 14;
    PluginEvent     plugin_event     = 15;
  }
}

message ServerMessage {
  uint64 seq = 1;
  uint64 ack = 2;
  oneof body {
    Command           command         = 10;
    RequestFile       request_file    = 11;
    InstallPlugin     install_plugin  = 12;
    UpdateConfig      update_config   = 13;
    Ping              ping            = 14;
  }
}

message Heartbeat {
  google.protobuf.Timestamp at = 1;
  uint64 uptime_s        = 2;
  uint64 mem_rss_bytes   = 3;
  float  cpu_load_1m     = 4;
}

message Telemetry {
  google.protobuf.Timestamp at = 1;
  string metric          = 2;
  double value           = 3;
  map<string, string> labels = 4;
}

message CommandResult {
  string command_id      = 1;
  int32  exit_code       = 2;
  bytes  stdout          = 3;
  bytes  stderr          = 4;
  uint32 duration_ms     = 5;
}

message FileChunk {
  string transfer_id     = 1;
  uint32 chunk_index     = 2;
  uint32 total_chunks    = 3;
  bytes  data            = 4;
  string sha256_hex      = 5;  // sent on last chunk
}

message LogBatch {
  repeated LogLine lines = 1;
}

message LogLine {
  google.protobuf.Timestamp at = 1;
  string level           = 2;
  string source          = 3;
  string message         = 4;
  map<string, string> fields = 5;
}

message PluginEvent {
  string plugin_id       = 1;
  string event           = 2;
  bytes  payload         = 3;
}

message Command {
  string command_id      = 1;
  string kind            = 2;  // "exec" | "transfer" | "plugin" | "config"
  bytes  payload         = 3;
  uint32 timeout_ms      = 4;
  // Signed by the issuing operator; the agent verifies before execution.
  bytes  signature       = 5;
  string signer_key_id   = 6;
}

message RequestFile {
  string transfer_id     = 1;
  string path            = 2;
}

message InstallPlugin {
  string plugin_id       = 1;
  string version         = 2;
  string bundle_url      = 3;
  bytes  bundle_signature = 4;
}

message UpdateConfig {
  string blob_json       = 1;
}

message Ping {
  uint64 nonce           = 1;
}
