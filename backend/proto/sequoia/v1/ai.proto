syntax = "proto3";
package sequoia.v1;

import "sequoia/v1/common.proto";
import "google/protobuf/timestamp.proto";

service AiOrchestrator {
  rpc CreateAgent  (CreateAgentRequest)  returns (Agent);
  rpc ListAgents   (ListAgentsRequest)   returns (ListAgentsResponse);
  rpc StartRun     (StartRunRequest)     returns (Run);
  rpc StreamRun    (StreamRunRequest)    returns (stream RunDelta);
  rpc CancelRun    (CancelRunRequest)    returns (Empty);

  // Generic typed completion API (model-agnostic).
  rpc Complete     (CompleteRequest)     returns (stream CompletionDelta);
}

message Agent {
  string id            = 1;
  string tenant_id     = 2;
  string name          = 3;
  string model         = 4;
  string system_prompt = 5;
  repeated string tool_ids = 6;
  google.protobuf.Timestamp created_at = 7;
}

message CreateAgentRequest {
  RequestContext context = 1;
  string name            = 2;
  string model           = 3;
  string system_prompt   = 4;
  repeated string tool_ids = 5;
}

message ListAgentsRequest {
  RequestContext context = 1;
  PageRequest    page    = 2;
}

message ListAgentsResponse {
  repeated Agent items   = 1;
  string next_cursor     = 2;
}

message StartRunRequest {
  RequestContext context = 1;
  string agent_id        = 2;
  string user_input      = 3;
  TokenBudget budget     = 4;
  map<string, string> variables = 5;
}

message TokenBudget {
  uint64 max_input_tokens  = 1;
  uint64 max_output_tokens = 2;
  uint64 max_total_cost_usd_micro = 3;
}

message Run {
  string id             = 1;
  string agent_id       = 2;
  string status         = 3;  // pending | running | succeeded | failed | cancelled
  google.protobuf.Timestamp started_at = 4;
}

message StreamRunRequest {
  RequestContext context = 1;
  string run_id          = 2;
}

message RunDelta {
  oneof body {
    AssistantText     text          = 1;
    ToolCall          tool_call     = 2;
    ToolResult        tool_result   = 3;
    RunFinished       finished      = 4;
    BudgetExceeded    budget        = 5;
  }
}

message AssistantText {
  string delta = 1;
}

message ToolCall {
  string id    = 1;
  string name  = 2;
  string arguments_json = 3;
}

message ToolResult {
  string call_id = 1;
  string result_json = 2;
  bool is_error = 3;
}

message RunFinished {
  string status = 1;
  uint64 input_tokens = 2;
  uint64 output_tokens = 3;
  uint64 cost_usd_micro = 4;
}

message BudgetExceeded {
  string which = 1;
}

message CancelRunRequest {
  RequestContext context = 1;
  string run_id          = 2;
}

// --- Generic completion ---

message CompleteRequest {
  RequestContext context = 1;
  string model           = 2;
  repeated Message messages = 3;
  repeated Tool tools    = 4;
  float temperature      = 5;
  uint32 max_tokens      = 6;
  TokenBudget budget     = 7;
  bool stream            = 8;
}

message Message {
  string role            = 1;  // system | user | assistant | tool
  string content         = 2;
  repeated ToolCall tool_calls = 3;
  string tool_call_id    = 4;
}

message Tool {
  string name            = 1;
  string description     = 2;
  string json_schema     = 3;
}

message CompletionDelta {
  oneof body {
    string text_delta    = 1;
    ToolCall tool_call   = 2;
    string finish_reason = 3;
  }
}
