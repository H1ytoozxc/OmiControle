apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: sequoia
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector: { matchLabels: { app: api-gateway } }
  template:
    metadata:
      labels: { app: api-gateway }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "8080" }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: ghcr.io/sequoia/api-gateway:latest
          imagePullPolicy: IfNotPresent
          args: []
          ports:
            - { name: http,    containerPort: 8080 }
            - { name: metrics, containerPort: 8080 }
          env:
            - { name: RUST_LOG, value: "info,h2=warn,hyper=warn" }
          envFrom:
            - secretRef: { name: api-gateway-secrets }
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits:   { cpu: 2,    memory: 1Gi }
          readinessProbe:
            httpGet: { path: /healthz/ready, port: 8080 }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz/live, port: 8080 }
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector: { matchLabels: { app: api-gateway } }
---
apiVersion: v1
kind: Service
metadata: { name: api-gateway, namespace: sequoia }
spec:
  selector: { app: api-gateway }
  ports:
    - { name: http, port: 80, targetPort: 8080 }
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: api-gateway, namespace: sequoia }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: api-gateway }
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource: { name: cpu,    target: { type: Utilization, averageUtilization: 60 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: api-gateway, namespace: sequoia }
spec:
  minAvailable: 2
  selector: { matchLabels: { app: api-gateway } }
