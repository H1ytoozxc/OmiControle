name: ci

on:
  push:    { branches: [main] }
  pull_request: {}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt-clippy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt,clippy }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: backend }
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env: { POSTGRES_USER: sequoia, POSTGRES_PASSWORD: sequoia, POSTGRES_DB: sequoia }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sequoia"
          --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: backend }
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo install cargo-nextest --locked
      - run: cargo nextest run --workspace
        env:
          DATABASE_URL: postgres://sequoia:sequoia@localhost:5432/sequoia
          REDIS_URL: redis://localhost:6379/0

  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit cargo-deny --locked
      - run: cargo audit
      - run: cargo deny check

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  build-images:
    runs-on: ubuntu-latest
    needs: [fmt-clippy, test]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        svc: [api-gateway, auth-service, device-service, ai-orchestrator,
              realtime-gateway, telemetry-service, notification-service,
              workflow-engine, plugin-host, command-executor]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: ${{ github.actor }}, password: ${{ secrets.GITHUB_TOKEN }} }
      - uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/deploy/docker/Dockerfile
          build-args: SVC=${{ matrix.svc }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.svc }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
